{% extends "base.html" %}

{% block title %}Register - HDI Predictor{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center py-4">
    <div class="col-md-7 col-lg-5">
        <div class="card card-premium p-4 border-dark-glow">
            <div class="card-header-premium text-center">
                <i class="fa-solid fa-user-plus text-teal fs-2 mb-3"></i>
                <h3 class="fw-bold tracking-wide mb-1">CREATE ACCOUNT</h3>
                <p class="text-secondary small">Sign up to predict and log Human Development Indices</p>
            </div>
            <div class="card-body">
                <form action="{{ url_for('main.register') }}" method="POST" id="register-form">
                    <!-- Full Name Input -->
                    <div class="mb-3">
                        <label for="full_name" class="form-label form-label-premium">Full Name</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark-glass border-secondary border-end-0 text-secondary">
                                <i class="fa-solid fa-user"></i>
                            </span>
                            <input type="text" class="form-control form-control-premium border-start-0" id="full_name" name="full_name" value="{{ full_name or '' }}" placeholder="Enter full name" required autocomplete="name">
                        </div>
                    </div>

                    <!-- Email Input -->
                    <div class="mb-3">
                        <label for="email" class="form-label form-label-premium">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark-glass border-secondary border-end-0 text-secondary">
                                <i class="fa-solid fa-envelope"></i>
                            </span>
                            <input type="email" class="form-control form-control-premium border-start-0" id="email" name="email" value="{{ email or '' }}" placeholder="Enter email address" required autocomplete="email">
                        </div>
                    </div>
                    
                    <!-- Password Input -->
                    <div class="mb-3">
                        <label for="password" class="form-label form-label-premium">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark-glass border-secondary border-end-0 text-secondary">
                                <i class="fa-solid fa-key"></i>
                            </span>
                            <input type="password" class="form-control form-control-premium border-start-0" id="password" name="password" placeholder="Create password (min 6 characters)" required autocomplete="new-password">
                        </div>
                    </div>

                    <!-- Confirm Password Input -->
                    <div class="mb-4">
                        <label for="confirm_password" class="form-label form-label-premium">Confirm Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark-glass border-secondary border-end-0 text-secondary">
                                <i class="fa-solid fa-check-double"></i>
                            </span>
                            <input type="password" class="form-control form-control-premium border-start-0" id="confirm_password" name="confirm_password" placeholder="Confirm password" required autocomplete="new-password">
                        </div>
                    </div>
                    
                    <!-- Submit Button -->
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-teal btn-lg" id="btn-register">
                            <i class="fa-solid fa-user-check me-2"></i> Register Account
                        </button>
                    </div>
                </form>
            </div>
            <div class="card-footer border-top border-dark-glow text-center pt-3">
                <p class="text-secondary small mb-0">
                    Already have an account? 
                    <a href="{{ url_for('main.login') }}" class="text-teal text-decoration-none fw-semibold" id="link-login">
                        Login here
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
