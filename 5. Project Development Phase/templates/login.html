{% extends "base.html" %}

{% block title %}Login - HDI Predictor{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center py-5">
    <div class="col-md-6 col-lg-5">
        <div class="card card-premium p-4 border-dark-glow">
            <div class="card-header-premium text-center">
                <i class="fa-solid fa-lock-open text-teal fs-2 mb-3"></i>
                <h3 class="fw-bold tracking-wide mb-1">USER LOGIN</h3>
                <p class="text-secondary small">Access the prediction engine and history logs</p>
            </div>
            <div class="card-body">
                <form action="{{ url_for('main.login') }}" method="POST" id="login-form">
                    <!-- Email Input -->
                    <div class="mb-3">
                        <label for="email" class="form-label form-label-premium">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark-glass border-secondary border-end-0 text-secondary">
                                <i class="fa-solid fa-envelope"></i>
                            </span>
                            <input type="email" class="form-control form-control-premium border-start-0" id="email" name="email" value="{{ email or '' }}" placeholder="Enter email address" required autocomplete="username">
                        </div>
                    </div>
                    
                    <!-- Password Input -->
                    <div class="mb-4">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <label for="password" class="form-label form-label-premium mb-0">Password</label>
                        </div>
                        <div class="input-group">
                            <span class="input-group-text bg-dark-glass border-secondary border-end-0 text-secondary">
                                <i class="fa-solid fa-key"></i>
                            </span>
                            <input type="password" class="form-control form-control-premium border-start-0" id="password" name="password" placeholder="Enter password" required autocomplete="current-password">
                        </div>
                    </div>
                    
                    <!-- Submit Button -->
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-teal btn-lg" id="btn-login">
                            <i class="fa-solid fa-arrow-right-to-bracket me-2"></i> Log In
                        </button>
                    </div>
                </form>
            </div>
            <div class="card-footer border-top border-dark-glow text-center pt-3">
                <p class="text-secondary small mb-0">
                    Don't have an account? 
                    <a href="{{ url_for('main.register') }}" class="text-teal text-decoration-none fw-semibold" id="link-register">
                        Register here
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
